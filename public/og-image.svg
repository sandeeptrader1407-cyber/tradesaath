<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0f1e"/>
      <stop offset="100%" stop-color="#141c30"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00cf82"/>
      <stop offset="100%" stop-color="#00e89d"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Logo dot -->
  <circle cx="100" cy="180" r="12" fill="#00cf82"/>

  <!-- Brand name -->
  <text x="125" y="193" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" fill="#ffffff">
    TradeSaath
  </text>

  <!-- Main headline -->
  <text x="100" y="290" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="700" fill="#ffffff">
    AI Trading Psychology
  </text>
  <text x="100" y="355" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="700" fill="#ffffff">
    Analysis
  </text>

  <!-- Subtext -->
  <text x="100" y="415" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#8b95a8">
    Upload your tradebook. Get your Decision Quality Score in 60 seconds.
  </text>

  <!-- Feature pills -->
  <g transform="translate(100, 470)">
    <!-- DQS Score -->
    <rect x="0" y="0" width="150" height="40" rx="20" fill="rgba(0,207,130,0.12)" stroke="#00cf82" stroke-width="1"/>
    <text x="75" y="26" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#00cf82">DQS Score</text>

    <!-- Pattern Detection -->
    <rect x="170" y="0" width="195" height="40" rx="20" fill="rgba(0,207,130,0.12)" stroke="#00cf82" stroke-width="1"/>
    <text x="267" y="26" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#00cf82">Pattern Detection</text>

    <!-- AI Coaching -->
    <rect x="385" y="0" width="150" height="40" rx="20" fill="rgba(0,207,130,0.12)" stroke="#00cf82" stroke-width="1"/>
    <text x="460" y="26" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#00cf82">AI Coaching</text>
  </g>

  <!-- Brokers badge -->
  <rect x="100" y="540" width="220" height="36" rx="8" fill="rgba(255,255,255,0.06)"/>
  <text x="210" y="564" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="500" fill="#8b95a8">Works with 21+ Brokers</text>

  <!-- Right side: DQS circle visualization -->
  <g transform="translate(920, 315)">
    <circle cx="0" cy="0" r="120" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="12"/>
    <circle cx="0" cy="0" r="120" fill="none" stroke="url(#accent)" stroke-width="12"
      stroke-dasharray="490 754" stroke-linecap="round" transform="rotate(-90)"/>
    <text x="0" y="-10" text-anchor="middle" font-family="system-ui, sans-serif" font-size="56" font-weight="700" fill="#ffffff">65</text>
    <text x="0" y="25" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="500" fill="#8b95a8">DQS Score</text>
  </g>
</svg>
